<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математический практикум</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body style="background: #f5f5f5; padding: 20px; margin: 0;">

<div class="oge-exam-block" style="max-width: 720px; margin: 0 auto; padding: 20px;">
    
    <div style="background: #ffffff; border-radius: 24px; box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05), 0 4px 8px rgba(0, 0, 0, 0.02); padding: 40px 35px; transition: all 0.3s ease;">
        
        <div style="text-align: center; margin-bottom: 35px;">
            <h3 style="font-family: 'DM Sans', system-ui, -apple-system, sans-serif; font-size: 28px; font-weight: 500; color: #1a1a1a; margin: 0 0 8px 0; letter-spacing: -0.3px;">Математический практикум</h3>
            <p style="font-family: 'DM Sans', system-ui, -apple-system, sans-serif; font-size: 16px; color: #6b6b6b; margin: 0;">Проверь свои знания и получи разбор решения</p>
        </div>

        <div style="background: #f7f9fc; border-radius: 20px; padding: 30px 20px; text-align: center; margin-bottom: 35px; border: 1px solid #edf2f7;">
            <p style="font-family: 'DM Sans', system-ui, sans-serif; font-size: 15px; font-weight: 500; color: #4a5568; margin: 0 0 12px 0; letter-spacing: 0.3px; text-transform: uppercase;">📐 Решите уравнение</p>
            <p style="font-family: 'DM Sans', system-ui, sans-serif; font-size: 36px; font-weight: 500; color: #1a1a1a; margin: 0; background: #ffffff; display: inline-block; padding: 15px 30px; border-radius: 60px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                2x + 25 = 5x
            </p>
        </div>

        <div style="margin-bottom: 30px;">
            <label for="mathAnswer" style="display: block; font-family: 'DM Sans', system-ui, sans-serif; font-size: 15px; font-weight: 500; color: #2d3748; margin-bottom: 10px;">Ваш ответ:</label>
            <input type="text" id="mathAnswer" style="width: 100%; padding: 16px 20px; font-family: 'DM Sans', system-ui, sans-serif; font-size: 16px; border: 1px solid #e2e8f0; border-radius: 16px; background: #ffffff; transition: all 0.2s ease; box-sizing: border-box;">
        </div>

        <button id="checkMathBtn" style="width: 100%; background: #1a1a1a; border: none; padding: 16px 20px; border-radius: 40px; font-family: 'DM Sans', system-ui, sans-serif; font-size: 16px; font-weight: 500; color: white; cursor: pointer; transition: all 0.2s ease; margin-bottom: 30px;">
            Проверить ответ →
        </button>

        <div id="mathResultArea" style="display: none; border-radius: 20px; padding: 0; margin-top: 10px;"></div>

        <div style="margin-top: 35px; padding-top: 25px; border-top: 1px solid #edf2f7; text-align: center;">
            <p style="font-family: 'DM Sans', system-ui, sans-serif; font-size: 13px; color: #a0aec0; margin: 0;">После проверки вы получите подробное объяснение решения</p>
        </div>
    </div>
</div>

<style>
    .oge-exam-block input:focus {
        outline: none;
        border-color: #1a1a1a !important;
        box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.05) !important;
    }
    
    .oge-exam-block button:hover {
        background: #000000 !important;
        transform: scale(0.98);
    }
    
    @media (max-width: 768px) {
        .oge-exam-block > div {
            padding: 25px 20px !important;
        }
        .oge-exam-block h3 {
            font-size: 24px !important;
        }
        .oge-exam-block div[style*="background: #f7f9fc"] p:last-child {
            font-size: 28px !important;
            padding: 12px 20px !important;
        }
    }
</style>

<script>
    const answerInput = document.getElementById('mathAnswer');
    const checkButton = document.getElementById('checkMathBtn');
    const resultArea = document.getElementById('mathResultArea');
    
    function checkMathAnswer() {
        let userAnswer = answerInput.value.trim().toLowerCase().replace(/\s/g, '');
        userAnswer = userAnswer.replace(/[,.]$/, '');
        
        const correctAnswers = [
            'x=25/3', '25/3', 'х=25/3', '8.33', '8,33', '8.333', 
            'x=8.33', 'x=8,33', 'x≈8.33', 'x≈8,33'
        ];
        
        const isCorrect = correctAnswers.includes(userAnswer);
        
        if (isCorrect) {
            resultArea.innerHTML = `
                <div style="background: #f0fdf4; border-radius: 20px; padding: 20px; border-left: 4px solid #22c55e;">
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
                        <span style="display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; background: #22c55e; color: white; font-weight: bold;">✓</span>
                        <span style="font-family: 'DM Sans', sans-serif; font-weight: 600; color: #166534;">✅ Абсолютно верно! Отличная работа!</span>
                    </div>
                    <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #bbf7d0; font-size: 14px; color: #166534;">
                        <strong>📖 Разбор решения:</strong><br><br>
                        1. Исходное уравнение: 2x + 25 = 5x<br><br>
                        2. Переносим 2x в правую часть: 25 = 5x - 2x<br><br>
                        3. Упрощаем: 25 = 3x<br><br>
                        4. Находим x: x = 25/3<br><br>
                        5. Ответ: x = 25/3 ≈ 8.33<br><br>
                        🎉 Ты справился! Продолжай в том же духе!
                    </div>
                </div>
            `;
        } else {
            let extraHint = '';
            if (userAnswer === 'x=5' || userAnswer === '5') {
                extraHint = '<br><br>⚠️ Ты ошибся в переносе слагаемых. Попробуй перенести 2x в правую часть уравнения.';
            } else if (userAnswer === 'x=25' || userAnswer === '25') {
                extraHint = '<br><br>⚠️ Не забудь разделить обе части уравнения на 3!';
            }
            
            resultArea.innerHTML = `
                <div style="background: #fef2f2; border-radius: 20px; padding: 20px; border-left: 4px solid #ef4444;">
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
                        <span style="display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; background: #ef4444; color: white; font-weight: bold;">✗</span>
                        <span style="font-family: 'DM Sans', sans-serif; font-weight: 600; color: #991b1b;">❌ К сожалению, ответ неверный</span>
                    </div>
                    <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #fecaca; font-size: 14px; color: #991b1b;">
                        <strong>📖 Правильное решение:</strong><br><br>
                        1. 2x + 25 = 5x<br><br>
                        2. Вычитаем 2x из обеих частей: 25 = 5x - 2x<br><br>
                        3. Получаем: 25 = 3x<br><br>
                        4. Делим обе части на 3: x = 25/3 ≈ 8.33<br><br>
                        <strong>🎯 Правильный ответ: x = 25/3</strong>${extraHint}<br><br>
                        💪 Не сдавайся! Попробуй еще раз.
                    </div>
                </div>
            `;
        }
        
        resultArea.style.display = 'block';
        resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    checkButton.addEventListener('click', checkMathAnswer);
    
    answerInput.addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            checkMathAnswer();
        }
    });
    
    answerInput.addEventListener('focus', function() {
        this.style.borderColor = '#1a1a1a';
        this.style.boxShadow = '0 0 0 3px rgba(26, 26, 26, 0.05)';
    });
    
    answerInput.addEventListener('blur', function() {
        this.style.borderColor = '#e2e8f0';
        this.style.boxShadow = 'none';
    });
</script>

</body>
</html>
